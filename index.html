<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rem van der Heijden — Video CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #root { width: 100%; height: 100%; }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
  }
  @keyframes glitch {
    0%,100% { clip-path: none; transform: none; }
    20% { clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%); transform: translate(-4px, 0); }
    21% { clip-path: none; transform: none; }
    40% { clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); transform: translate(4px, 0); }
    41% { clip-path: none; transform: none; }
  }
  @keyframes stamp {
    0% { transform: scale(3) rotate(-15deg); opacity: 0; }
    60% { transform: scale(0.95) rotate(-15deg); opacity: 1; }
    70% { transform: scale(1.05) rotate(-15deg); }
    100% { transform: scale(1) rotate(-15deg); opacity: 1; }
  }
  @keyframes letterPress {
    0% { opacity: 0; transform: scale(1.4); filter: blur(20px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  @keyframes slideUp {
    0% { opacity: 0; transform: translateY(60px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInLeft {
    0% { opacity: 0; transform: translateX(-100px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInRight {
    0% { opacity: 0; transform: translateX(100px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes zoomIn {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes countUp {
    0% { opacity: 0; transform: translateY(30px) scale(0.5); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes barFill {
    0% { width: 0%; }
    100% { width: var(--target-width); }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  @keyframes typewriter {
    from { width: 0; }
    to { width: 100%; }
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    10% { transform: translateX(-8px) rotate(-1deg); }
    20% { transform: translateX(8px) rotate(1deg); }
    30% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    50% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    70% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }
  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes borderFlash {
    0%,100% { border-color: #f5c518; }
    50% { border-color: #fff; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Scene Components ────────────────────────────────────────────────────────

function SceneIntro({ progress, localTime }) {

// ─── Epic Music Engine ───────────────────────────────────────────────────────

function createEpicMusic(audioCtx, masterGain) {
  const BPM = 128;
  const BEAT = 60 / BPM;
  const BAR = BEAT * 4;

  function note(freq, startTime, duration, type = 'sawtooth', gain = 0.3, detune = 0) {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2000;
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    osc.connect(filter);
    filter.connect(env);
    env.connect(masterGain);
    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(gain, startTime + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
    return osc;
  }

  function kick(t) {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
    env.gain.setValueAtTime(1.0, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(env);
    env.connect(masterGain);
    osc.start(t); osc.stop(t + 0.3);
  }

  function snare(t) {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const env = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2500;
    filter.Q.value = 0.8;
    env.gain.setValueAtTime(0.5, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.connect(filter);
    filter.connect(env);
    env.connect(masterGain);
    src.start(t); src.stop(t + 0.2);
  }

  function hihat(t, open = false) {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * (open ? 0.18 : 0.06), audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const env = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 8000;
    env.gain.setValueAtTime(open ? 0.25 : 0.15, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + (open ? 0.18 : 0.06));
    src.connect(filter);
    filter.connect(env);
    env.connect(masterGain);
    src.start(t); src.stop(t + 0.25);
  }

  function brass(freq, startTime, duration, gain = 0.18) {
    // Layered sawtooth for brass-like sound
    [-5, 0, 5, 12].forEach(detune => note(freq, startTime, duration, 'sawtooth', gain * 0.5, detune));
  }

  const now = audioCtx.currentTime + 0.1;
  const totalBars = 18;

  // ── DRUMS ──
  for (let bar = 0; bar < totalBars; bar++) {
    const t = now + bar * BAR;
    // Kick pattern: 1, 3 (and upbeat variations)
    kick(t);
    kick(t + BEAT * 2);
    if (bar % 2 === 1) kick(t + BEAT * 2.75);
    // Snare: 2, 4
    snare(t + BEAT);
    snare(t + BEAT * 3);
    // Hi-hats: every 8th note
    for (let i = 0; i < 8; i++) hihat(t + i * BEAT * 0.5, i === 6);
  }

  // ── BASS LINE ──
  const bassNotes = [
    [55, 0], [55, 0.5], [55, 1], [49, 1.5], [52, 2], [52, 2.5], [55, 3], [58, 3.5],
  ];
  for (let bar = 0; bar < totalBars; bar++) {
    const t = now + bar * BAR;
    bassNotes.forEach(([freq, beat]) => {
      note(freq, t + beat * BEAT, BEAT * 0.45, 'square', 0.22);
    });
  }

  // ── EPIC MELODY (Trumpet-like brass lead) ──
  // Key: A minor, triumphant theme
  const melody = [
    // Bar 1-2: buildup
    [220, 0, 1], [277, 1, 0.5], [330, 1.5, 0.5], [440, 2, 2],
    // Bar 3-4: answer
    [392, 4, 1], [349, 5, 0.5], [330, 5.5, 0.5], [294, 6, 2],
    // Bar 5-6: climb
    [330, 8, 0.5], [370, 8.5, 0.5], [440, 9, 1], [494, 10, 0.5], [554, 10.5, 0.5], [587, 11, 1],
    // Bar 7-8: peak
    [659, 12, 1.5], [587, 13.5, 0.5], [554, 14, 1], [494, 15, 1],
  ];
  melody.forEach(([freq, beat, dur]) => {
    brass(freq, now + beat * BEAT, dur * BEAT, 0.2);
  });

  // Repeat melody from bar 8
  melody.forEach(([freq, beat, dur]) => {
    brass(freq, now + (beat + 32) * BEAT, dur * BEAT, 0.22);
  });

  // ── PAD / ATMOSPHERE ──
  const padChords = [
    [[220, 277, 330], 0, 8],   // Am
    [[196, 247, 294], 8, 8],   // Gm
    [[175, 220, 262], 16, 8],  // Fm
    [[220, 277, 330], 24, 8],  // Am
    [[247, 311, 370], 32, 8],  // Bm
    [[220, 277, 330], 40, 8],  // Am final
    [[262, 330, 392], 48, 8],  // Cm big
    [[220, 277, 330, 440], 56, 16],  // Am high ending
  ];
  padChords.forEach(([freqs, startBeat, durBeats]) => {
    freqs.forEach(freq => {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.connect(filter);
      filter.connect(env);
      env.connect(masterGain);
      const st = now + startBeat * BEAT;
      const dur = durBeats * BEAT;
      env.gain.setValueAtTime(0, st);
      env.gain.linearRampToValueAtTime(0.06, st + 0.3);
      env.gain.setValueAtTime(0.06, st + dur - 0.3);
      env.gain.linearRampToValueAtTime(0, st + dur);
      osc.start(st); osc.stop(st + dur + 0.1);
    });
  });
}

// ─── Main App ────────────────────────────────────────────────────────────────

const TOTAL_DURATION = 72; // seconds

// Scene definitions: [startTime, endTime, Component, label]
const SCENES = [
  [0,    5,   SceneIntro,         'COLD OPEN'],
  [5,    12,  SceneTitle,         'TITLE CARD'],
  [12,   20,  SceneNameReveal,    'NAME REVEAL'],
  [20,   31,  SceneInterview,     'INTERVIEW'],
  [31,   42,  SceneAchievements,  'ACHIEVEMENTS'],
  [42,   50,  SceneStats,         'STATS'],
  [50,   61,  SceneSkillBars,     'SKILL MATRIX'],
  [61,   68,  SceneTestimonial,   'TESTIMONIAL'],
  [68,   77,  SceneReasons,       'WHY REM'],
  [77,   TOTAL_DURATION + 15, SceneFinal, 'FINALE'],
];

function App() {
  const [time, setTime] = useState(() => {
    const saved = parseFloat(localStorage.getItem('remvc_time') || '0');
    return isNaN(saved) ? 0 : saved;
  });
  const [playing, setPlaying] = useState(false);
  const [showControls, setShowControls] = useState(true);
  const rafRef = useRef(null);
  const lastRealTime = useRef(null);
  const controlsTimer = useRef(null);
  const audioCtxRef = useRef(null);
  const masterGainRef = useRef(null);
  const musicStartedRef = useRef(false);

  const totalDuration = TOTAL_DURATION;

  const tick = useCallback((realNow) => {
    if (lastRealTime.current !== null) {
      const delta = (realNow - lastRealTime.current) / 1000;
      setTime(prev => {
        const next = Math.min(prev + delta, totalDuration);
        localStorage.setItem('remvc_time', next);
        return next;
      });
    }
    lastRealTime.current = realNow;
    rafRef.current = requestAnimationFrame(tick);
  }, [totalDuration]);

  useEffect(() => {
    if (playing) {
      lastRealTime.current = null;
      rafRef.current = requestAnimationFrame(tick);
    } else {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastRealTime.current = null;
    }
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [playing, tick]);

  // Stop at end
  useEffect(() => {
    if (time >= totalDuration) setPlaying(false);
  }, [time, totalDuration]);

  const handleMouseMove = useCallback(() => {
    setShowControls(true);
    clearTimeout(controlsTimer.current);
    controlsTimer.current = setTimeout(() => setShowControls(false), 3000);
  }, []);

  const startMusic = () => {
    if (musicStartedRef.current) return;
    musicStartedRef.current = true;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtxRef.current = ctx;
    const master = ctx.createGain();
    master.gain.value = 0.55;
    master.connect(ctx.destination);
    masterGainRef.current = master;
    createEpicMusic(ctx, master);
  };

  const togglePlay = () => {
    if (time >= totalDuration) {
      setTime(0);
      localStorage.setItem('remvc_time', '0');
      musicStartedRef.current = false;
      if (audioCtxRef.current) { audioCtxRef.current.close(); audioCtxRef.current = null; }
      setPlaying(true);
      return;
    }
    if (!playing) startMusic();
    setPlaying(p => !p);
  };

  const seek = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const newTime = x * totalDuration;
    setTime(newTime);
    localStorage.setItem('remvc_time', newTime);
  };

  // Determine current scene
  const currentScenes = SCENES.filter(([s, e]) => time >= s && time < e);

  const formatTime = (t) => {
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  };

  return (
    <div
      style={{ width: '100vw', height: '100vh', background: '#000', position: 'relative', cursor: showControls ? 'default' : 'none' }}
      onMouseMove={handleMouseMove}
      onClick={(e) => { if (e.target === e.currentTarget) togglePlay(); }}
    >
      {/* Scene layer */}
      <div style={{ position: 'absolute', inset: 0 }}>
        {currentScenes.map(([start, end, SceneComp, label]) => {
          const localTime = time - start;
          const progress = (time - start) / (end - start);
          return (
            <div key={label} style={{ position: 'absolute', inset: 0 }}>
              <SceneComp localTime={localTime} progress={Math.min(1, Math.max(0, progress))} />
            </div>
          );
        })}
      </div>

      {/* Scene flash on transition */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 50,
        background: '#fff',
        opacity: SCENES.some(([s]) => Math.abs(time - s) < 0.06) ? 0.15 : 0,
        transition: 'opacity 0.06s',
      }} />

      {/* Film grain overlay */}
      <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 60, opacity: 0.04,
        background: 'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 512 512\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'n\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.75\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23n)\'/%3E%3C/svg%3E")',
        backgroundSize: '256px',
      }} />

      {/* Controls */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 100,
        background: 'linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%)',
        padding: '40px 40px 30px',
        opacity: showControls ? 1 : 0,
        transition: 'opacity 0.4s ease',
      }}>
        {/* Progress bar */}
        <div
          style={{ height: '4px', background: 'rgba(255,255,255,0.15)', cursor: 'pointer', marginBottom: '20px', position: 'relative' }}
          onClick={seek}
        >
          <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: `${(time / totalDuration) * 100}%`, background: '#f5c518', transition: 'width 0.1s linear' }} />
          {/* Chapter marks */}
          {SCENES.map(([s], i) => (
            <div key={i} style={{ position: 'absolute', top: '-3px', left: `${(s / totalDuration) * 100}%`, width: '2px', height: '10px', background: 'rgba(255,255,255,0.3)' }} />
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '24px' }}>
          <button
            onClick={togglePlay}
            style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '8px', color: '#fff', fontSize: '28px', display: 'flex', alignItems: 'center', lineHeight: 1 }}
          >
            {playing ? '⏸' : '▶'}
          </button>
          <div style={{ fontFamily: 'Roboto Mono, monospace', fontSize: '13px', color: 'rgba(255,255,255,0.6)', letterSpacing: '2px' }}>
            {formatTime(time)} / {formatTime(totalDuration)}
          </div>
          <div style={{ flex: 1 }} />
          {currentScenes[0] && (
            <div style={{ fontFamily: 'Roboto Mono, monospace', fontSize: '12px', color: '#f5c518', letterSpacing: '4px', opacity: 0.7 }}>
              {currentScenes[0][3]}
            </div>
          )}
          <button
            onClick={() => { setTime(0); setPlaying(false); localStorage.setItem('remvc_time', '0'); musicStartedRef.current = false; if (audioCtxRef.current) { audioCtxRef.current.close(); audioCtxRef.current = null; } }}
            style={{ background: 'none', border: '1px solid rgba(255,255,255,0.2)', cursor: 'pointer', padding: '6px 16px', color: 'rgba(255,255,255,0.5)', fontSize: '12px', fontFamily: 'Roboto Mono, monospace', letterSpacing: '2px' }}
          >RESTART</button>
        </div>
      </div>

      {/* Click-to-play overlay when paused and at 0 */}
      {!playing && time === 0 && (
        <div
          onClick={togglePlay}
          style={{ position: 'absolute', inset: 0, zIndex: 90, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', background: 'rgba(0,0,0,0.7)' }}
        >
          <div style={{ width: '100px', height: '100px', borderRadius: '50%', border: '3px solid #f5c518', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '30px', animation: 'pulse 2s ease infinite' }}>
            <div style={{ fontSize: '44px', marginLeft: '8px' }}>▶</div>
          </div>
          <div style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: '32px', color: '#fff', letterSpacing: '10px' }}>PRESS PLAY</div>
          <div style={{ fontFamily: 'Roboto Mono, monospace', fontSize: '14px', color: '#666', letterSpacing: '4px', marginTop: '12px' }}>REM VAN DER HEIJDEN — VIDEO CV 2026</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
